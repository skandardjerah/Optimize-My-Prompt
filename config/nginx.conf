# ── OptimizeMyPrompt AI — Nginx Reverse Proxy Config ─────────────────────────
#
# Place this file at:  /etc/nginx/sites-available/promptcraft
# Enable with:         sudo ln -s /etc/nginx/sites-available/promptcraft \
#                                 /etc/nginx/sites-enabled/
#                      sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Node.js server running on 127.0.0.1:3000 (managed by PM2)
#   - SSL certificates at /etc/letsencrypt/live/<domain>/  (Certbot)
#   - Replace <your-domain.com> with your actual domain
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream pool ─────────────────────────────────────────────────────────────
# PM2 cluster forks bind to the same port; Nginx connects to that single port.
# keepalive reuses TCP connections to Node — critical for SSE performance.
upstream promptcraft_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Complements Express rate-limiter — drops floods before they reach Node.
limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=optimize_zone:10m rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name <your-domain.com> www.<your-domain.com>;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name <your-domain.com> www.<your-domain.com>;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<your-domain.com>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<your-domain.com>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers (complement Helmet) ─────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header Referrer-Policy          "strict-origin"     always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        text/html application/xml;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 64k;       # prompts are text; 64 KB is generous
    client_body_timeout  10s;
    client_header_timeout 10s;
    keepalive_timeout    65s;

    # ── Static files — served directly by Nginx ───────────────────────────────
    location /public/ {
        root /var/www/promptcraft;      # adjust to your deploy path
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── /api/optimize — SSE streaming endpoint ────────────────────────────────
    # Buffering MUST be disabled or the browser receives chunks all at once.
    location /api/optimize {
        limit_req zone=optimize_zone burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://promptcraft_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";          # keep-alive for upstream
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable ALL buffering for SSE
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      120s;   # allow long-running LLM streams
        proxy_send_timeout      120s;
        chunked_transfer_encoding on;
    }

    # ── All other /api/ routes ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://promptcraft_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # ── Health check — no rate limit ─────────────────────────────────────────
    location /health {
        proxy_pass         http://promptcraft_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # ── Root — proxy to Node (serves static from public/) ────────────────────
    location / {
        proxy_pass         http://promptcraft_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
